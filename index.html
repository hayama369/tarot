<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAROT</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0b1533; --navy2:#16264f;
    --ice:#cfe8ff; --ice2:#9fd0f5;
    --silver:#dce8f4; --silver2:#aebfd6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100vh;
    background:linear-gradient(170deg,var(--navy) 0%,var(--navy2) 45%,#31527e 85%,#6f93b8 130%);
    color:var(--ice);
    font-family:'Zen Kaku Gothic New',sans-serif;
    overflow-x:hidden;
  }
  .star{position:fixed;border-radius:50%;background:#fff;pointer-events:none;
    animation:tw 3.5s infinite ease-in-out;opacity:0}
  @keyframes tw{0%,100%{opacity:0}50%{opacity:.8}}
  .shooting{position:fixed;top:12%;left:-10%;width:110px;height:1.5px;pointer-events:none;
    background:linear-gradient(90deg,rgba(255,255,255,0),#fff);
    transform:rotate(18deg);opacity:0;animation:shoot 11s infinite ease-in}
  @keyframes shoot{0%,92%{opacity:0;left:-10%;top:10%}94%{opacity:.9}
    100%{opacity:0;left:80%;top:38%}}

  header{text-align:center;padding:52px 16px 24px}
  h1{
    font-family:'Cinzel',serif;font-size:2.1rem;letter-spacing:.35em;
    background:linear-gradient(90deg,var(--ice),#fff,var(--silver2));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 24px rgba(170,210,255,.25);
  }

  .pray{
    text-align:center;font-size:.8rem;color:#a8c4e4;
    letter-spacing:.15em;padding:0 16px 14px;
  }

  .modes{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;padding:8px 16px 30px}
  .modes button{
    font-family:'Zen Kaku Gothic New';font-size:.9rem;letter-spacing:.08em;
    padding:11px 22px;border-radius:999px;cursor:pointer;
    color:var(--ice);background:rgba(255,255,255,.05);
    border:1px solid rgba(190,215,240,.4);transition:.25s;
  }
  .modes button:hover,.modes button.on{
    background:rgba(200,225,250,.16);
    box-shadow:0 0 18px rgba(190,215,250,.35);color:#fff;
  }

  #board{max-width:860px;margin:0 auto;padding:0 14px 10px}
  .hint{text-align:center;font-size:.78rem;color:#93b3d6;letter-spacing:.2em;
    margin-bottom:22px;min-height:1em}
  .row{display:flex;flex-wrap:wrap;justify-content:center;gap:18px}
  .keywrap{margin-top:36px;display:flex;justify-content:center}

  /* 伏せられたカード */
  .tcard{transition:transform .28s ease, box-shadow .3s}
  .tcard.facedown{
    width:190px;height:290px;border-radius:14px;cursor:pointer;
    border:1px solid rgba(200,220,245,.5);
    background:
      radial-gradient(circle at 22% 28%, rgba(255,255,255,.14) 0 1.4px, transparent 2px),
      radial-gradient(circle at 74% 18%, rgba(255,255,255,.12) 0 1px, transparent 1.8px),
      radial-gradient(circle at 60% 66%, rgba(255,255,255,.1) 0 1.2px, transparent 2px),
      radial-gradient(circle at 32% 82%, rgba(255,255,255,.12) 0 1px, transparent 1.8px),
      radial-gradient(circle at 85% 78%, rgba(255,255,255,.1) 0 1.3px, transparent 2px),
      linear-gradient(160deg,#101c3e,#1a2c58 60%,#22355f);
    box-shadow:0 6px 22px rgba(0,10,40,.55), inset 0 0 30px rgba(120,160,220,.12);
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;
  }
  .tcard.facedown:hover{transform:translateY(-5px);
    box-shadow:0 10px 28px rgba(80,140,220,.35)}
  .tcard.facedown .glyph{font-size:1.7rem;color:#cfe2f8;text-shadow:0 0 14px rgba(180,215,255,.8)}
  .tcard.facedown .poslabel{font-size:.68rem;letter-spacing:.28em;color:#8fb0d6}
  .tcard.facedown.keyback{border:1px solid var(--silver);
    box-shadow:0 0 24px rgba(215,230,248,.3), inset 0 0 30px rgba(160,190,230,.15)}

  /* 開かれたカード */
  .tcard.open{
    width:250px;background:rgba(10,20,45,.6);
    border:1px solid rgba(170,205,245,.45);border-radius:14px;
    padding:18px;backdrop-filter:blur(4px);
    box-shadow:0 4px 24px rgba(0,10,40,.5);cursor:default;
  }
  .tcard.open.key{
    border:1px solid var(--silver);
    box-shadow:0 0 26px rgba(215,230,250,.28);
    background:rgba(18,26,52,.72);
  }
  .pos{font-size:.72rem;letter-spacing:.25em;color:#8fb6dd;margin-bottom:6px}
  .open.key .pos{color:var(--silver)}
  .cimg{width:50%;border-radius:8px;margin:6px auto 8px;display:block;
    border:1px solid rgba(170,205,245,.3)}
  .cimg.revimg{transform:rotate(180deg)}
  .cname{font-family:'Cinzel',serif;font-size:1.05rem;color:#fff}
  .cname small{display:block;font-size:.68rem;color:#a9c8ea;letter-spacing:.12em;margin-top:2px}
  .dir{display:inline-block;margin:8px 0;font-size:.72rem;padding:2px 10px;border-radius:999px;
    border:1px solid rgba(200,225,255,.4)}
  .dir.rev{color:#f0c8c8;border-color:rgba(240,180,180,.5)}
  .kw{font-size:.8rem;line-height:1.7;color:#bcd7f2}
  .desc{margin-top:8px;font-size:.82rem;line-height:1.8;color:#e2eefb}
  .desc .lbl{display:block;font-size:.65rem;letter-spacing:.22em;color:#8fb0d4;margin-bottom:3px}
  .open.key .desc .lbl{color:var(--silver2)}
  .personal{margin-top:10px;padding-top:10px;border-top:1px dashed rgba(180,205,240,.35);
    font-size:.82rem;line-height:1.7;color:var(--silver)}
  .personal::before{content:"― わたしの読み";display:block;font-size:.66rem;
    letter-spacing:.2em;color:var(--silver2);margin-bottom:4px}

  .flipping{transform:scaleX(0)}
  .rise{animation:rise .45s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

  /* ===== ケルティッククロス盤面 ===== */
  .celtic{
    display:grid;
    grid-template-columns:repeat(3,84px) 84px;
    grid-template-rows:repeat(4,126px);
    gap:12px;justify-content:center;align-items:center;
    margin:6px auto 8px;
  }
  .cpos5{grid-column:2;grid-row:1}
  .cpos4{grid-column:1;grid-row:2}
  .ccross{grid-column:2;grid-row:2;position:relative}
  .cpos6{grid-column:3;grid-row:2}
  .cpos3{grid-column:2;grid-row:3}
  .cpos10{grid-column:4;grid-row:1}
  .cpos9{grid-column:4;grid-row:2}
  .cpos8{grid-column:4;grid-row:3}
  .cpos7{grid-column:4;grid-row:4}

  /* ===== ミニカード(3Dフリップ対応) ===== */
  .mcard{
    width:84px;height:126px;border-radius:8px;position:relative;
    animation:rise .5s ease both;
    perspective:600px;          /* 3D奥行き */
    background:transparent;border:none;box-shadow:none;
  }
  .mcard .flip-inner{
    position:relative;width:100%;height:100%;
    transition:transform .7s cubic-bezier(.4,.1,.2,1);
    transform-style:preserve-3d;
  }
  .mcard.flipped .flip-inner{transform:rotateY(180deg)}

  /* 裏面(伏せた面) */
  .mface{
    position:absolute;inset:0;border-radius:8px;overflow:hidden;
    backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border:1px solid rgba(170,205,245,.5);
    box-shadow:0 3px 12px rgba(0,10,40,.5);
  }
  .mback{
    background:
      radial-gradient(circle at 25% 30%, rgba(255,255,255,.14) 0 1.2px, transparent 1.8px),
      radial-gradient(circle at 70% 20%, rgba(255,255,255,.12) 0 1px, transparent 1.6px),
      radial-gradient(circle at 55% 70%, rgba(255,255,255,.1) 0 1px, transparent 1.6px),
      linear-gradient(160deg,#101c3e,#1a2c58 60%,#22355f);
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;
  }
  .mback .glyph{font-size:1.1rem;color:#cfe2f8;text-shadow:0 0 10px rgba(180,215,255,.8)}
  .mback .mnum{font-size:.62rem;color:#8fb0d6;font-family:'Cinzel',serif}

  /* 表面 */
  .mfront{
    transform:rotateY(180deg);
    background:rgba(10,20,45,.65);
  }
  .mfront img{width:100%;height:100%;object-fit:cover;display:block}
  .mcard.mrev .mfront img{transform:rotate(180deg)}
  .mfront .mnum{
    position:absolute;bottom:2px;right:5px;font-size:.62rem;color:#eaf3ff;
    text-shadow:0 0 5px rgba(0,0,0,.9);font-family:'Cinzel',serif}
  .mfront .mname{
    display:none;width:100%;height:100%;padding:6px;text-align:center;
    align-items:center;justify-content:center;font-size:.6rem;line-height:1.5;color:#cfe2f8}
  .mcard.mrev .mfront .mname{transform:rotate(180deg)}
  .mcard.crossed{
    position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%) rotate(90deg);
  }
  .mcard.flipped .mface{box-shadow:0 0 14px rgba(150,200,255,.45)}

  .legend{text-align:center;font-size:.7rem;color:#8fb0d6;letter-spacing:.12em;
    margin:4px 0 26px;line-height:1.9}

  /* 開くボタン */
  .revealwrap{text-align:center;margin:32px 0}
  #btnReveal{
    padding:12px 32px;font-size:1rem;letter-spacing:.08em;
    background:rgba(200,225,250,.16);
    border:1px solid rgba(190,215,240,.4);color:#cfe8ff;border-radius:999px;
    cursor:pointer;transition:.25s;font-family:'Zen Kaku Gothic New';
  }
  #btnReveal:hover{box-shadow:0 0 18px rgba(190,215,250,.35);color:#fff}
  #btnReveal:disabled{opacity:.45;cursor:default;box-shadow:none}

  /* 総合解説 */
  #overall{max-width:720px;margin:44px auto 60px;padding:0 16px;display:none}
  #overall.show{display:block;animation:rise .7s ease both}
  #overall .panel{
    background:rgba(14,22,46,.72);border:1px solid var(--silver2);
    border-radius:16px;padding:26px 24px;
    box-shadow:0 0 32px rgba(200,220,245,.18);backdrop-filter:blur(5px);
  }
  #overall h2{font-family:'Cinzel',serif;font-size:.95rem;letter-spacing:.35em;
    color:var(--silver);text-align:center;margin-bottom:16px}
  #overall p{font-size:.86rem;line-height:2;color:#dfeafb}

  @media (max-width:560px){
    .row{gap:12px}
    .tcard.facedown{width:150px;height:230px}
    .tcard.open{width:100%;max-width:340px}
    .celtic{grid-template-columns:repeat(3,64px) 64px;grid-template-rows:repeat(4,96px);gap:8px}
    .mcard{width:64px;height:96px}
  }

  /* ===== タブ ===== */
  .tabs{display:flex;justify-content:center;gap:8px;padding:0 16px 22px}
  .tab{
    font-family:'Cinzel','Zen Kaku Gothic New',serif;font-size:.82rem;letter-spacing:.2em;
    padding:9px 26px;border-radius:10px 10px 0 0;cursor:pointer;
    color:#9db8d8;background:rgba(255,255,255,.04);
    border:1px solid rgba(190,215,240,.25);border-bottom:none;transition:.25s;
  }
  .tab.on{color:#fff;background:rgba(200,225,250,.14);
    box-shadow:0 -2px 16px rgba(190,215,250,.25);border-color:rgba(190,215,240,.5)}

  /* ===== 調べるモード:スロット ===== */
  #lkBoard{max-width:860px;margin:0 auto;padding:0 14px 6px}
  .lkgrid{display:flex;flex-wrap:wrap;justify-content:center;gap:16px}
  .lkslot{width:120px;display:flex;flex-direction:column;align-items:center;gap:6px;
    animation:rise .4s ease both}
  .lkslot .slabel{font-size:.68rem;letter-spacing:.12em;color:#8fb0d6;text-align:center;
    min-height:2.2em;display:flex;align-items:center;justify-content:center;line-height:1.4}
  .lkslot input.slabel-in{
    width:100%;font-size:.7rem;text-align:center;padding:4px 6px;border-radius:6px;
    background:rgba(255,255,255,.06);border:1px solid rgba(190,215,240,.4);
    color:var(--ice);font-family:'Zen Kaku Gothic New'}
  .lkframe{
    width:100px;height:150px;border-radius:10px;cursor:pointer;position:relative;
    border:1.5px dashed rgba(170,205,245,.5);
    background:rgba(10,20,45,.35);
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;
    transition:.25s;overflow:hidden;
  }
  .lkframe:hover{border-color:rgba(210,230,255,.85);box-shadow:0 0 14px rgba(150,200,255,.3)}
  .lkframe .plus{font-size:1.5rem;color:#7fa2cc}
  .lkframe .tapmsg{font-size:.58rem;letter-spacing:.15em;color:#7fa2cc}
  .lkframe.filled{border:1px solid rgba(170,205,245,.6);
    box-shadow:0 3px 14px rgba(0,10,40,.5)}
  .lkframe.filled img{width:100%;height:100%;object-fit:cover}
  .lkframe.filled.frev img{transform:rotate(180deg)}
  .lkframe .fname{
    position:absolute;bottom:0;left:0;right:0;font-size:.58rem;text-align:center;
    padding:3px 2px;background:rgba(5,12,30,.75);color:#dcebfc;line-height:1.3}
  .lkframe .fdir{
    position:absolute;top:3px;right:4px;font-size:.55rem;padding:1px 6px;border-radius:999px;
    background:rgba(5,12,30,.8);border:1px solid rgba(200,225,255,.4);color:#cfe2f8}
  .lkframe .fdir.rev{color:#f0c8c8;border-color:rgba(240,180,180,.5)}
  .lkctl{display:flex;gap:4px;justify-content:center;flex-wrap:wrap}
  .lkctl button{
    font-size:.62rem;padding:3px 8px;border-radius:6px;cursor:pointer;
    background:rgba(255,255,255,.06);border:1px solid rgba(190,215,240,.35);
    color:#a8c4e4;font-family:'Zen Kaku Gothic New';transition:.2s}
  .lkctl button:hover{color:#fff;border-color:rgba(210,230,255,.7)}
  .lk-tools{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;padding:0 16px 24px}
  .lk-tools button{
    font-size:.75rem;padding:8px 18px;border-radius:999px;cursor:pointer;letter-spacing:.08em;
    background:rgba(255,255,255,.05);border:1px solid rgba(190,215,240,.4);
    color:var(--ice);font-family:'Zen Kaku Gothic New';transition:.25s}
  .lk-tools button:hover,.lk-tools button.on{background:rgba(200,225,250,.16);color:#fff;
    box-shadow:0 0 14px rgba(190,215,250,.3)}
  #lkDetails{max-width:860px;margin:26px auto 0;padding:0 14px}
  #lkOverall{max-width:720px;margin:36px auto 20px;padding:0 16px;display:none}
  #lkOverall.show{display:block;animation:rise .6s ease both}
  #lkOverall .panel{
    background:rgba(14,22,46,.72);border:1px solid var(--silver2);
    border-radius:16px;padding:26px 24px;
    box-shadow:0 0 32px rgba(200,220,245,.18);backdrop-filter:blur(5px)}
  #lkOverall h2{font-family:'Cinzel',serif;font-size:.95rem;letter-spacing:.35em;
    color:var(--silver);text-align:center;margin-bottom:16px}
  #lkOverall p{font-size:.86rem;line-height:2;color:#dfeafb}

  /* ===== カード選択モーダル ===== */
  #pickerOverlay{
    display:none;position:fixed;inset:0;z-index:100;
    background:rgba(4,9,24,.8);backdrop-filter:blur(3px);
    align-items:center;justify-content:center;padding:20px}
  #pickerOverlay.show{display:flex}
  #picker{
    width:min(880px,100%);max-height:86vh;display:flex;flex-direction:column;
    background:linear-gradient(165deg,#0e1a3c,#15254c);
    border:1px solid rgba(190,215,240,.5);border-radius:16px;
    box-shadow:0 10px 50px rgba(0,5,20,.8);overflow:hidden;
    animation:rise .3s ease both}
  .picker-head{
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    padding:14px 18px;border-bottom:1px solid rgba(190,215,240,.25)}
  .picker-head .ptitle{font-size:.85rem;letter-spacing:.15em;color:#dcebfc;flex:1}
  .dirsel{display:flex;gap:6px}
  .dirsel button{
    font-size:.72rem;padding:5px 14px;border-radius:999px;cursor:pointer;
    background:rgba(255,255,255,.05);border:1px solid rgba(190,215,240,.4);
    color:#a8c4e4;font-family:'Zen Kaku Gothic New';transition:.2s}
  .dirsel button.on{background:rgba(200,225,250,.2);color:#fff;
    box-shadow:0 0 10px rgba(190,215,250,.35)}
  .dirsel button#dirRev.on{background:rgba(240,180,180,.18);color:#f6d4d4;
    border-color:rgba(240,180,180,.5)}
  .picker-close{
    font-size:1rem;padding:4px 12px;border-radius:8px;cursor:pointer;
    background:none;border:1px solid rgba(190,215,240,.35);color:#a8c4e4}
  #pickerGrid{overflow-y:auto;padding:14px 18px 22px}
  .psec{font-family:'Cinzel','Zen Kaku Gothic New',serif;font-size:.72rem;letter-spacing:.25em;
    color:var(--silver2);margin:14px 0 8px;border-bottom:1px dashed rgba(180,205,240,.3);
    padding-bottom:4px}
  .pcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:10px}
  .pcard{cursor:pointer;text-align:center;transition:.2s;border-radius:8px;padding:4px}
  .pcard:hover{background:rgba(200,225,250,.12);transform:translateY(-2px)}
  .pcard .pthumb{
    width:100%;aspect-ratio:2/3;border-radius:6px;overflow:hidden;
    border:1px solid rgba(170,205,245,.4);background:rgba(10,20,45,.6);
    display:flex;align-items:center;justify-content:center}
  .pcard .pthumb img{width:100%;height:100%;object-fit:cover}
  .pcard .pthumb .pfall{display:none;font-size:.56rem;line-height:1.4;color:#cfe2f8;padding:4px}
  .pcard .pnm{font-size:.58rem;color:#a8c4e4;margin-top:4px;line-height:1.3}

  /* ===== 保存・記録 ===== */
  .savebox{max-width:720px;margin:10px auto 50px;padding:0 16px;display:none}
  .savebox.show{display:block;animation:rise .5s ease both}
  .savebox .inner{
    background:rgba(14,22,46,.6);border:1px dashed rgba(180,205,240,.4);
    border-radius:14px;padding:18px 20px}
  .savebox .sdate{font-size:.72rem;letter-spacing:.15em;color:#8fb0d6;margin-bottom:8px}
  .savebox textarea{
    width:100%;min-height:70px;resize:vertical;border-radius:10px;padding:10px 12px;
    background:rgba(255,255,255,.06);border:1px solid rgba(190,215,240,.35);
    color:var(--ice);font-family:'Zen Kaku Gothic New';font-size:.82rem;line-height:1.7}
  .savebox .sbtn{
    margin-top:10px;font-size:.8rem;padding:9px 26px;border-radius:999px;cursor:pointer;
    letter-spacing:.1em;background:rgba(200,225,250,.16);
    border:1px solid rgba(190,215,240,.45);color:#e8f2ff;
    font-family:'Zen Kaku Gothic New';transition:.25s}
  .savebox .sbtn:hover{box-shadow:0 0 16px rgba(190,215,250,.35);color:#fff}
  .savebox .sdone{font-size:.78rem;color:#bfe3c9;letter-spacing:.1em}

  #recordsList{max-width:760px;margin:0 auto 60px;padding:0 16px}
  .rec{
    background:rgba(14,22,46,.6);border:1px solid rgba(170,200,235,.35);
    border-radius:14px;padding:18px 20px;margin-bottom:16px;animation:rise .4s ease both}
  .rec .rhead{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .rec .rdate{font-size:.74rem;letter-spacing:.12em;color:#9fc0e4}
  .rec .rtitle{font-size:.86rem;color:#fff;letter-spacing:.1em}
  .rec .rcards{font-size:.76rem;line-height:1.9;color:#bcd7f2;margin-top:8px}
  .rec .rmemo{font-size:.8rem;line-height:1.8;color:var(--silver);margin-top:8px;
    padding-top:8px;border-top:1px dashed rgba(180,205,240,.3);white-space:pre-wrap}
  .rec .rmemo::before{content:"― メモ";display:block;font-size:.64rem;
    letter-spacing:.2em;color:var(--silver2);margin-bottom:3px}
  .rec .roverall{font-size:.78rem;line-height:1.9;color:#cfe0f5;margin-top:8px;display:none}
  .rec.openbody .roverall{display:block}
  .rec .rbtns{display:flex;gap:8px;margin-top:12px}
  .rec .rbtns button{
    font-size:.68rem;padding:5px 14px;border-radius:999px;cursor:pointer;
    background:rgba(255,255,255,.05);border:1px solid rgba(190,215,240,.35);
    color:#a8c4e4;font-family:'Zen Kaku Gothic New';transition:.2s}
  .rec .rbtns button:hover{color:#fff}
  .rec .rbtns .rdel:hover{color:#f6b8b8;border-color:rgba(240,170,170,.5)}
  .norec{text-align:center;font-size:.8rem;color:#8fb0d6;letter-spacing:.15em;padding:30px 0}

</style>
</head>
<body>
<header>
  <h1>TAROT</h1>
</header>

<nav class="tabs">
  <button id="tabFortune" class="tab on" onclick="switchTab('fortune')">占い</button>
  <button id="tabLookup" class="tab" onclick="switchTab('lookup')">調べる</button>
  <button id="tabRecords" class="tab" onclick="switchTab('records')">記録</button>
</nav>

<!-- ============ 占いページ ============ -->
<div id="page-fortune">
  <p class="pray">占いたいことを思い浮かべながらタップしてください</p>

  <div class="modes">
    <button id="btn1" onclick="drawOne()">ワンオラクル</button>
    <button id="btn3" onclick="drawThree()">スリーカード</button>

/* ===================== アプリ本体 ===================== */
const board = document.getElementById('board');
const overall = document.getElementById('overall');
let draw = [];
let flipped = 0;

function pick(pool, n){
  const a=[...pool];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a.slice(0,n);
}
const flip = () => Math.random() < 0.5 ? 'upright' : 'reversed';

function faceDownHTML(i, isKey, posLabel){
  return `<div class="tcard facedown ${isKey?'keyback':''}" id="slot${i}" onclick="reveal(${i})">
    <div class="glyph">✦</div>
    <div class="poslabel">${posLabel}</div>
  </div>`;
}

function faceHTML(item){
  const m = item.card[item.dir];
  const isRev = item.dir==='reversed';
  const body = item.isKey
    ? `<div class="desc"><span class="lbl">読み解きのヒント</span>${m.keyHint}</div>`
    : `<div class="desc"><span class="lbl">状況の説明</span>${m.text}</div>`;
  return `<div class="pos">${item.pos}</div>
    <img class="cimg ${isRev?'revimg':''}" src="img/${item.card.id}.png" alt="${item.card.name}" onerror="this.style.display='none'">
    <div class="cname">${item.card.name}<small>${item.card.name_en}</small></div>
    <span class="dir ${isRev?'rev':''}">${isRev?'逆位置':'正位置'}</span>
    <div class="kw">${m.keywords}</div>
    ${body}
    ${m.personal ? `<div class="personal">${m.personal}</div>` : ''}`;
}

function reveal(i){
  const el = document.getElementById('slot'+i);
  if(!el || !el.classList.contains('facedown')) return;
  el.classList.add('flipping');
  setTimeout(()=>{
    el.classList.remove('facedown','keyback','flipping');
    el.classList.add('open','rise');
    if(draw[i].isKey) el.classList.add('key');
    el.innerHTML = faceHTML(draw[i]);
    el.onclick = null;
    flipped++;
    if(flipped === draw.length) showOverall();
  }, 280);
}

function setup(items){
  draw = items; flipped = 0;
  overall.classList.remove('show'); overall.innerHTML = '';
  clearSaveArea('saveArea');
  const main = items.filter(x=>!x.isKey)
    .map((x)=>faceDownHTML(items.indexOf(x), false, x.pos)).join('');
  const keyIdx = items.findIndex(x=>x.isKey);
  board.innerHTML =
    `<div class="hint">カードをタップしてめくってください</div>
     <div class="row">${main}</div>
     <div class="keywrap">${faceDownHTML(keyIdx, true, 'キーカード')}</div>`;
}

function drawOne(){
  setActive('btn1');
  const majors = CARDS.filter(c=>c.arcana==='major');
  const main = pick(majors,1)[0];
  const key  = pick(CARDS.filter(c=>c.id!==main.id),1)[0];
  setup([
    {card:main, dir:flip(), pos:'メインカード', isKey:false},
    {card:key,  dir:flip(), pos:'キーカード ─ 読み解きの鍵', isKey:true}
  ]);
}

function drawThree(){
  setActive('btn3');
  const p = pick(CARDS,4);
  const labels = ['状況','障害','アドバイス'];
  const items = p.slice(0,3).map((c,i)=>({card:c, dir:flip(), pos:labels[i], isKey:false}));
  items.push({card:p[3], dir:flip(), pos:'キーカード ─ 読み解きの鍵', isKey:true});
  setup(items);
}

/* ===== じっくりタロット(ケルティッククロス・フリップ開封) ===== */
const CELTIC_LABELS = ['現状','障害','顕在意識','潜在意識','過去','近未来','自分の立場','周囲の状況','願望と恐れ','最終結果'];

/* 裏向きで置かれるミニカード(3Dフリップ構造)
   drawIdx = draw配列のインデックス / n = 表示番号 */
function miniHTML(item, n, extraClass, drawIdx){
  const isRev = item.dir==='reversed';
  return `<div class="mcard ${isRev?'mrev':''} ${extraClass||''}" id="mini${drawIdx}">
    <div class="flip-inner">
      <div class="mface mback">
        <div class="glyph">✦</div>
        <span class="mnum">${n}</span>
      </div>
      <div class="mface mfront">
        <img src="img/${item.card.id}.png" alt=""
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="mname">${item.card.name}</div>
        <span class="mnum">${n}</span>
      </div>
    </div>
  </div>`;
}

function drawCeltic(){
  setActive('btnC');
  const p = pick(CARDS,10);
  draw = p.map((c,i)=>({card:c, dir:flip(), pos:`${i+1}. ${CELTIC_LABELS[i]}`, isKey:false}));
  flipped = 10;
  overall.classList.remove('show'); overall.innerHTML = '';
  clearSaveArea('saveArea');

  /* 盤面(十字) 全部伏せた状態で配置 */
  const boardHTML =
    `<div class="hint">ケルティッククロス ─ 10枚の物語</div>
     <div class="celtic">
       <div class="cpos5">${miniHTML(draw[2],3,'',2)}</div>
       <div class="cpos4">${miniHTML(draw[4],5,'',4)}</div>
       <div class="ccross">${miniHTML(draw[0],1,'',0)}${miniHTML(draw[1],2,'crossed',1)}</div>
       <div class="cpos6">${miniHTML(draw[5],6,'',5)}</div>
       <div class="cpos3">${miniHTML(draw[3],4,'',3)}</div>
       <div class="cpos10">${miniHTML(draw[9],10,'',9)}</div>
       <div class="cpos9">${miniHTML(draw[8],9,'',8)}</div>
       <div class="cpos8">${miniHTML(draw[7],8,'',7)}</div>
       <div class="cpos7">${miniHTML(draw[6],7,'',6)}</div>
     </div>
     <div class="legend">1 現状 / 2 障害 / 3 顕在意識 / 4 潜在意識 / 5 過去<br>
       6 近未来 / 7 自分の立場 / 8 周囲の状況 / 9 願望と恐れ / 10 最終結果</div>
     <div class="revealwrap">
       <button id="btnReveal" onclick="revealAllCeltic()">すべてのカードを開く</button>
     </div>
     <div id="cardDetails" class="row"></div>`;

  board.innerHTML = boardHTML;
}

function revealAllCeltic(){
  const btn = document.getElementById('btnReveal');
  if(!btn || btn.disabled) return;
  btn.disabled = true;

  const details = document.getElementById('cardDetails');
  const flipInterval = 350;   // 1枚ごとの間隔(ms)
  const flipDuration = 700;   // CSSのフリップ時間と揃える

  /* 1→10の順にシャララーンとフリップ */
  for(let i = 0; i < 10; i++){
    setTimeout(() => {
      const el = document.getElementById('mini'+i);
      if(el) el.classList.add('flipped');
    }, i * flipInterval);
  }

  /* 全部めくれ終わったら、詳細カードをふわっと順に出す */
  const detailStart = 10 * flipInterval + flipDuration;
  for(let i = 0; i < 10; i++){
    setTimeout(() => {
      const cardEl = document.createElement('div');
      cardEl.className = 'tcard open';
      cardEl.innerHTML = faceHTML(draw[i]);
      cardEl.style.opacity = '0';
      cardEl.style.transform = 'translateY(12px)';
      details.appendChild(cardEl);
      requestAnimationFrame(() => {
        cardEl.style.transition = 'opacity .45s ease, transform .45s ease';
        cardEl.style.opacity = '1';
        cardEl.style.transform = 'none';
      });
    }, detailStart + i * 120);
  }

  /* 最後に総合解説、ボタンは静かに消す */
  setTimeout(() => {
    btn.parentElement.style.transition = 'opacity .5s ease';
    btn.parentElement.style.opacity = '0';
    setTimeout(()=>btn.parentElement.remove(), 500);
    showCelticOverall();
  }, detailStart + 10 * 120 + 400);
}

function showCelticOverall(){
  const g = i => draw[i].card[draw[i].dir];
  const nm = i => `「${draw[i].card.name}(${dirLabel(draw[i].dir)})」`;
  const text =
    `中心にあるのは${nm(0)}。${g(0).summary}──これが今の現在地です。`+
    `そこに${nm(1)}が横たわり、${g(1).summary}が課題として交差しています。`+
    `頭では${nm(2)}が示すように${g(2).summary}を意識していますが、心の深いところでは${nm(3)}──${g(3).summary}が流れています。`+
    `ここまでの経緯として${nm(4)}は${g(4).summary}を物語り、この流れのままいけば、近い未来は${nm(5)}が示す${g(5).summary}へ向かいます。`+
    `あなた自身の立ち位置は${nm(6)}(${g(6).summary})、周囲の状況は${nm(7)}(${g(7).summary})。`+
    `心の底にある願いと恐れを映すのは${nm(8)}で、${g(8).summary}がその正体です。`+
    `そしてこの読み全体の到達点として、${nm(9)}が${g(9).summary}を告げています。`+
    `10枚をひとつの物語として眺めたとき、どこか一箇所、胸に引っかかる場所があるはずです。そこが、今のあなたにとっての本題です。`;
  overall.innerHTML = `<div class="panel"><h2>READING</h2><p>${text}</p></div>`;
  overall.classList.add('show');
  showSaveUI('saveArea', 'fortune', text);
}

function setActive(id){
  document.querySelectorAll('.modes button').forEach(b=>b.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

function dirLabel(d){ return d==='upright' ? '正位置' : '逆位置'; }

function showOverall(){
  let text = '';
  if(draw.length === 2){
    const m = draw[0], k = draw[1];
    const mm = m.card[m.dir], km = k.card[k.dir];
    text =
      `今日の中心にあるのは「${m.card.name}(${dirLabel(m.dir)})」。${mm.summary}──それがこの一枚のメッセージです。`+
      `そこに、鍵として「${k.card.name}(${dirLabel(k.dir)})」が添えられました。${km.summary}という視点を重ねると、メインカードの意味はより立体的になります。`+
      `${km.keyHint}二枚をひとつの絵として眺めたとき、心に最初に浮かんだ言葉を、今日の合言葉にしてみてください。`;
  } else {
    const [a,b,c,k] = draw;
    const am=a.card[a.dir], bm=b.card[b.dir], cm=c.card[c.dir], km=k.card[k.dir];
    text =
      `まず状況。「${a.card.name}(${dirLabel(a.dir)})」が示すのは、${am.summary}。ここがこの読みの出発点です。`+
      `次に障害。「${b.card.name}(${dirLabel(b.dir)})」が指しているのは、${bm.summary}。流れを重くしているのは、おそらくこの部分です。`+
      `そしてアドバイスの「${c.card.name}(${dirLabel(c.dir)})」。${cm.summary}という位置から、次の一手を考えてみてください。`+
      `最後に、全体を読み解く鍵となる「${k.card.name}(${dirLabel(k.dir)})」は、${km.summary}を告げています。${km.keyHint}`+
      `三枚と鍵をひとつの物語として繋げたとき、どこか一箇所、胸に引っかかる場所があるはずです。そこが、今のあなたにとっての本題です。`;
  }
  overall.innerHTML = `<div class="panel"><h2>READING</h2><p>${text}</p></div>`;
  overall.classList.add('show');
  showSaveUI('saveArea', 'fortune', text);
}

const sh=document.createElement('div');sh.className='shooting';document.body.appendChild(sh);

/* =====================================================
   ここから追加機能:タブ / 調べる / 保存・記録
===================================================== */

/* ===== タブ切り替え ===== */
function switchTab(t){
  const pages = {fortune:'page-fortune', lookup:'page-lookup', records:'page-records'};
  const tabs  = {fortune:'tabFortune',  lookup:'tabLookup',  records:'tabRecords'};
  Object.keys(pages).forEach(k=>{
    document.getElementById(pages[k]).style.display = (k===t)?'':'none';
    document.getElementById(tabs[k]).classList.toggle('on', k===t);
  });
  if(t==='records') renderRecords();
}

/* ===== 調べるモード ===== */
const LK_TEMPLATES = {
  one:   ['メインカード'],
  three: ['状況','障害','アドバイス'],
  celtic:['1. 現状','2. 障害','3. 顕在意識','4. 潜在意識','5. 過去',
          '6. 近未来','7. 自分の立場','8. 周囲の状況','9. 願望と恐れ','10. 最終結果'],
  free:  ['枠 1','枠 2','枠 3']
};
const LK_TITLES = {one:'ワンオラクル', three:'スリーカード', celtic:'ケルト十字', free:'カスタム'};

let lkSlots = [];        // {label, cardId(null可), dir}
let lkMode  = null;
let lkEdit  = false;
let lkPickIdx = -1;
let lkPickDir = 'upright';

function lkTemplate(mode){
  lkMode = mode;
  const ids = {one:'lkbtn1', three:'lkbtn3', celtic:'lkbtnC', free:'lkbtnF'};
  document.querySelectorAll('#page-lookup .modes button').forEach(b=>b.classList.remove('on'));
  document.getElementById(ids[mode]).classList.add('on');
  lkSlots = LK_TEMPLATES[mode].map(l=>({label:l, cardId:null, dir:'upright'}));
  lkEdit = (mode==='free');
  document.getElementById('lkTools').style.display = '';
  updateEditBtn();
  renderLk();
}

function lkAddSlot(){
  if(!lkMode) return;
  lkSlots.push({label:'枠 '+(lkSlots.length+1), cardId:null, dir:'upright'});
  renderLk();
}
function lkToggleEdit(){
  lkEdit = !lkEdit; updateEditBtn(); renderLk();
}
function updateEditBtn(){
  const b = document.getElementById('lkEditBtn');
  if(b) b.classList.toggle('on', lkEdit);
}
function lkClearAll(){
  lkSlots.forEach(s=>{s.cardId=null; s.dir='upright';});
  renderLk();
}
function lkMove(i, d){
  const j = i + d;
  if(j < 0 || j >= lkSlots.length) return;
  [lkSlots[i], lkSlots[j]] = [lkSlots[j], lkSlots[i]];
  renderLk();
}
function lkDelete(i){
  lkSlots.splice(i,1);
  renderLk();
}
function lkRemoveCard(i, ev){
  if(ev) ev.stopPropagation();
  lkSlots[i].cardId = null;
  renderLk();
}
function lkLabelChange(i, el){
  lkSlots[i].label = el.value || ('枠 '+(i+1));
  renderLkDetails();   /* 枠は再描画しない(入力中のフォーカスを守る) */
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderLk(){
  const boardEl = document.getElementById('lkBoard');
  if(!lkMode){ boardEl.innerHTML=''; return; }
  const html = lkSlots.map((s,i)=>{
    const card = s.cardId===null ? null : CARDS.find(c=>c.id===s.cardId);
    const isRev = s.dir==='reversed';
    const frame = card
      ? `<div class="lkframe filled ${isRev?'frev':''}" onclick="openPicker(${i})">
           <img src="img/${card.id}.png" alt="" onerror="this.style.display='none'">
           <span class="fdir ${isRev?'rev':''}">${isRev?'逆':'正'}</span>
           <div class="fname">${card.name}</div>
         </div>`
      : `<div class="lkframe" onclick="openPicker(${i})">
           <div class="plus">＋</div><div class="tapmsg">タップして選ぶ</div>
         </div>`;
    const label = lkEdit
      ? `<input class="slabel-in" value="${esc(s.label)}" onchange="lkLabelChange(${i},this)">`
      : `<div class="slabel">${esc(s.label)}</div>`;
    const ctl = lkEdit
      ? `<div class="lkctl">
           <button onclick="lkMove(${i},-1)">◀</button>
           <button onclick="lkMove(${i},1)">▶</button>
           ${card?`<button onclick="lkRemoveCard(${i},event)">外す</button>`:''}
           <button onclick="lkDelete(${i})">✕枠</button>
         </div>`
      : (card?`<div class="lkctl"><button onclick="lkRemoveCard(${i},event)">外す</button></div>`:'');
    return `<div class="lkslot">${label}${frame}${ctl}</div>`;
  }).join('');
  boardEl.innerHTML = `<div class="lkgrid">${html}</div>`;
  renderLkDetails();
}

function renderLkDetails(){
  const det = document.getElementById('lkDetails');
  const ov  = document.getElementById('lkOverall');
  const filled = lkSlots.filter(s=>s.cardId!==null);
  det.innerHTML = lkSlots.map(s=>{
    if(s.cardId===null) return '';
    const card = CARDS.find(c=>c.id===s.cardId);
    return `<div class="tcard open rise">${faceHTML({card:card, dir:s.dir, pos:esc(s.label), isKey:false})}</div>`;
  }).join('');

  clearSaveArea('lkSaveArea');
  if(lkSlots.length > 0 && filled.length === lkSlots.length){
    const text = lkOverallText();
    ov.innerHTML = `<div class="panel"><h2>READING</h2><p>${text}</p></div>`;
    ov.classList.add('show');
    showSaveUI('lkSaveArea', 'lookup', text);
  } else {
    ov.classList.remove('show'); ov.innerHTML='';
  }
}

function lkOverallText(){
  const parts = lkSlots.map(s=>{
    const card = CARDS.find(c=>c.id===s.cardId);
    const m = card[s.dir];
    return `「${esc(s.label)}」に置かれたのは「${card.name}(${dirLabel(s.dir)})」。${m.summary}を告げています。`;
  });
  return parts.join('') +
    `並べたカードをひとつの物語として眺めたとき、どこか一箇所、胸に引っかかる場所があるはずです。そこが、今のあなたにとっての本題です。`;
}

/* ===== カード選択モーダル ===== */
const SUIT_SECTIONS = [
  {key:'major',     name:'大アルカナ',  test:c=>c.arcana==='major'},
  {key:'wands',     name:'ワンド',      test:c=>c.suit==='wands'},
  {key:'cups',      name:'カップ',      test:c=>c.suit==='cups'},
  {key:'swords',    name:'ソード',      test:c=>c.suit==='swords'},
  {key:'pentacles', name:'ペンタクル',  test:c=>c.suit==='pentacles'}
];

function openPicker(i){
  lkPickIdx = i;
  document.getElementById('pickerTitle').textContent =
    `「${lkSlots[i].label}」のカードを選ぶ`;
  setPickDir(lkSlots[i].cardId!==null ? lkSlots[i].dir : 'upright');
  const grid = document.getElementById('pickerGrid');
  grid.innerHTML = SUIT_SECTIONS.map(sec=>{
    const cells = CARDS.filter(sec.test).map(c=>
      `<div class="pcard" onclick="pickCard(${c.id})">
         <div class="pthumb">
           <img src="img/${c.id}.png" alt="" loading="lazy"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
           <div class="pfall">${c.name}</div>
         </div>
         <div class="pnm">${c.name}</div>
       </div>`).join('');
    return `<div class="psec">${sec.name}</div><div class="pcards">${cells}</div>`;
  }).join('');
  document.getElementById('pickerOverlay').classList.add('show');
}
function setPickDir(d){
  lkPickDir = d;
  document.getElementById('dirUp').classList.toggle('on', d==='upright');
  document.getElementById('dirRev').classList.toggle('on', d==='reversed');
}
function pickCard(id){
  if(lkPickIdx < 0) return;
  lkSlots[lkPickIdx].cardId = id;
  lkSlots[lkPickIdx].dir = lkPickDir;
  closePicker();
  renderLk();
}
function closePicker(){
  document.getElementById('pickerOverlay').classList.remove('show');
  lkPickIdx = -1;
}
function pickerBgClose(ev){
  if(ev.target === document.getElementById('pickerOverlay')) closePicker();
}

/* ===== 保存・記録 ===== */
const REC_KEY = 'tarotRecords';
function loadRecords(){
  try{ return JSON.parse(localStorage.getItem(REC_KEY) || '[]'); }
  catch(e){ return []; }
}
function persistRecords(a){
  try{ localStorage.setItem(REC_KEY, JSON.stringify(a)); return true; }
  catch(e){ return false; }
}
function nowStr(){
  const d = new Date(), z = n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}/${z(d.getMonth()+1)}/${z(d.getDate())} ${z(d.getHours())}:${z(d.getMinutes())}`;
}

function clearSaveArea(id){
  const el = document.getElementById(id);
  if(el){ el.classList.remove('show'); el.innerHTML=''; }
}

/* mode: 'fortune'(draw配列を保存) / 'lookup'(lkSlotsを保存) */
function showSaveUI(areaId, mode, overallText){
  const area = document.getElementById(areaId);
  if(!area) return;
  area.dataset.overall = overallText;
  area.dataset.mode = mode;
  area.innerHTML =
    `<div class="inner">
       <div class="sdate">${nowStr()} の記録として保存できます</div>
       <textarea placeholder="メモ(占った内容、感じたことなど)"></textarea>
       <div><button class="sbtn" onclick="saveReading('${areaId}')">この結果を保存する</button></div>
     </div>`;
  area.classList.add('show');
}

function saveReading(areaId){
  const area = document.getElementById(areaId);
  const memo = area.querySelector('textarea').value.trim();
  const mode = area.dataset.mode;
  let title, cards;
  if(mode === 'fortune'){
    title = draw.length===2 ? 'ワンオラクル' : draw.length===4 ? 'スリーカード' : 'じっくりタロット';
    cards = draw.map(x=>({pos:x.pos, name:x.card.name, dir:x.dir}));
  } else {
    title = '調べる:' + (LK_TITLES[lkMode] || 'カスタム');
    cards = lkSlots.filter(s=>s.cardId!==null).map(s=>{
      const c = CARDS.find(cc=>cc.id===s.cardId);
      return {pos:s.label, name:c.name, dir:s.dir};
    });
  }
  const recs = loadRecords();
  recs.unshift({
    id: Date.now(),
    date: nowStr(),
    title: title,
    memo: memo,
    cards: cards,
    overall: area.dataset.overall || ''
  });
  const ok = persistRecords(recs);
  area.innerHTML = ok
    ? `<div class="inner"><span class="sdone">✦ 保存しました ─ 「記録」タブから見返せます</span></div>`
    : `<div class="inner"><span class="sdone" style="color:#f6b8b8">保存できませんでした(ブラウザの保存領域を確認してください)</span></div>`;
}

function renderRecords(){
  const list = document.getElementById('recordsList');
  const recs = loadRecords();
  if(recs.length === 0){
    list.innerHTML = `<div class="norec">まだ記録はありません</div>`;
    return;
  }
  list.innerHTML = recs.map(r=>{
    const cardsLine = r.cards.map(c=>`${esc(c.pos)}:${esc(c.name)}(${c.dir==='reversed'?'逆':'正'})`).join(' ／ ');
    return `<div class="rec" id="rec${r.id}">
      <div class="rhead"><span class="rdate">${esc(r.date)}</span><span class="rtitle">${esc(r.title)}</span></div>
      <div class="rcards">${cardsLine}</div>
      ${r.memo ? `<div class="rmemo">${esc(r.memo)}</div>` : ''}
      <div class="roverall">${esc(r.overall)}</div>
      <div class="rbtns">
        <button onclick="document.getElementById('rec${r.id}').classList.toggle('openbody')">解説を開閉</button>
        <button class="rdel" onclick="deleteRecord(${r.id})">削除</button>
      </div>
    </div>`;
  }).join('');
}

function deleteRecord(id){
  if(!confirm('この記録を削除しますか?')) return;
  persistRecords(loadRecords().filter(r=>r.id!==id));
  renderRecords();
}
