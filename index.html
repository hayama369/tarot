<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAROT</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0b1533; --navy2:#16264f;
    --ice:#cfe8ff; --ice2:#9fd0f5;
    --silver:#dce8f4; --silver2:#aebfd6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100vh;
    background:linear-gradient(170deg,var(--navy) 0%,var(--navy2) 45%,#31527e 85%,#6f93b8 130%);
    color:var(--ice);
    font-family:'Zen Kaku Gothic New',sans-serif;
    overflow-x:hidden;
  }
  .star{position:fixed;border-radius:50%;background:#fff;pointer-events:none;
    animation:tw 3.5s infinite ease-in-out;opacity:0}
  @keyframes tw{0%,100%{opacity:0}50%{opacity:.8}}
  .shooting{position:fixed;top:12%;left:-10%;width:110px;height:1.5px;pointer-events:none;
    background:linear-gradient(90deg,rgba(255,255,255,0),#fff);
    transform:rotate(18deg);opacity:0;animation:shoot 11s infinite ease-in}
  @keyframes shoot{0%,92%{opacity:0;left:-10%;top:10%}94%{opacity:.9}
    100%{opacity:0;left:80%;top:38%}}

  header{text-align:center;padding:52px 16px 24px}
  h1{
    font-family:'Cinzel',serif;font-size:2.1rem;letter-spacing:.35em;
    background:linear-gradient(90deg,var(--ice),#fff,var(--silver2));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 24px rgba(170,210,255,.25);
  }

  .pray{
    text-align:center;font-size:.8rem;color:#a8c4e4;
    letter-spacing:.15em;padding:0 16px 14px;
  }

  .modes{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;padding:8px 16px 30px}
  .modes button{
    font-family:'Zen Kaku Gothic New';font-size:.9rem;letter-spacing:.08em;
    padding:11px 22px;border-radius:999px;cursor:pointer;
    color:var(--ice);background:rgba(255,255,255,.05);
    border:1px solid rgba(190,215,240,.4);transition:.25s;
  }
  .modes button:hover,.modes button.on{
    background:rgba(200,225,250,.16);
    box-shadow:0 0 18px rgba(190,215,250,.35);color:#fff;
  }

  #board{max-width:860px;margin:0 auto;padding:0 14px 10px}
  .hint{text-align:center;font-size:.78rem;color:#93b3d6;letter-spacing:.2em;
    margin-bottom:22px;min-height:1em}
  .row{display:flex;flex-wrap:wrap;justify-content:center;gap:18px}
  .keywrap{margin-top:36px;display:flex;justify-content:center}

  /* 伏せられたカード */
  .tcard{transition:transform .28s ease, box-shadow .3s}
  .tcard.facedown{
    width:190px;height:290px;border-radius:14px;cursor:pointer;
    border:1px solid rgba(200,220,245,.5);
    background:
      radial-gradient(circle at 22% 28%, rgba(255,255,255,.14) 0 1.4px, transparent 2px),
      radial-gradient(circle at 74% 18%, rgba(255,255,255,.12) 0 1px, transparent 1.8px),
      radial-gradient(circle at 60% 66%, rgba(255,255,255,.1) 0 1.2px, transparent 2px),
      radial-gradient(circle at 32% 82%, rgba(255,255,255,.12) 0 1px, transparent 1.8px),
      radial-gradient(circle at 85% 78%, rgba(255,255,255,.1) 0 1.3px, transparent 2px),
      linear-gradient(160deg,#101c3e,#1a2c58 60%,#22355f);
    box-shadow:0 6px 22px rgba(0,10,40,.55), inset 0 0 30px rgba(120,160,220,.12);
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;
  }
  .tcard.facedown:hover{transform:translateY(-5px);
    box-shadow:0 10px 28px rgba(80,140,220,.35)}
  .tcard.facedown .glyph{font-size:1.7rem;color:#cfe2f8;text-shadow:0 0 14px rgba(180,215,255,.8)}
  .tcard.facedown .poslabel{font-size:.68rem;letter-spacing:.28em;color:#8fb0d6}
  .tcard.facedown.keyback{border:1px solid var(--silver);
    box-shadow:0 0 24px rgba(215,230,248,.3), inset 0 0 30px rgba(160,190,230,.15)}

  /* 開かれたカード */
  .tcard.open{
    width:250px;background:rgba(10,20,45,.6);
    border:1px solid rgba(170,205,245,.45);border-radius:14px;
    padding:18px;backdrop-filter:blur(4px);
    box-shadow:0 4px 24px rgba(0,10,40,.5);cursor:default;
  }
  .tcard.open.key{
    border:1px solid var(--silver);
    box-shadow:0 0 26px rgba(215,230,250,.28);
    background:rgba(18,26,52,.72);
  }
  .pos{font-size:.72rem;letter-spacing:.25em;color:#8fb6dd;margin-bottom:6px}
  .open.key .pos{color:var(--silver)}
  .cimg{width:50%;border-radius:8px;margin:6px auto 8px;display:block;
    border:1px solid rgba(170,205,245,.3)}
  .cimg.revimg{transform:rotate(180deg)}
  .cname{font-family:'Cinzel',serif;font-size:1.05rem;color:#fff}
  .cname small{display:block;font-size:.68rem;color:#a9c8ea;letter-spacing:.12em;margin-top:2px}
  .dir{display:inline-block;margin:8px 0;font-size:.72rem;padding:2px 10px;border-radius:999px;
    border:1px solid rgba(200,225,255,.4)}
